
[window]
dynamic_title = true
opacity = 0.7

[cursor]
style = { shape = "Beam" }
vi_mode_style = { shape = "Underline" }

[selection]
save_to_clipboard = true

[scrolling]
history = 2_000

[terminal.shell]
program = "/usr/bin/zsh"

[font]
normal = { family = "Hack Nerd Font Mono", style = "Regular" }
bold = { family = "Hack Nerd Font Mono", style = "Bold" }
italic = { family = "Hack Nerd Font Mono", style = "Regualr Italic" }
bold_italic = { family = "Hack Nerd Font Mono", style = "Bold Italic" }

[keyboard]
bindings = [
  { key = "V", mods = "Control", action = "Paste" },
  { key = "C", mods = "Control", action = "Copy" },
  { key = "Space", mods = "Shift|Control", action = "ToggleViMode" },
]

[general]
live_config_reload = true
import = ["~/.config/alacritty/themes/themes/monokai_charcoal.yml"]

[terminal]
