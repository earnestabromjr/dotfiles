# ============================================================
# Mango WM - Monitor Configuration
# ============================================================
# Format: monitorrule=name:NAME,width:W,height:H,refresh:R,x:X,y:Y,scale:S
# Use `wlr-randr` to get monitor names and info.

# Laptop display (eDP-1) - 1080p @ 60Hz
# Replace with your actual monitor name and preferred resolution
monitorrule=name:^eDP-1$,width:1920,height:1080,refresh:60,x:0,y:0,scale:1,vrr:0,rr:0

# External monitor example (HDMI-A-1) - 1440p @ 144Hz
# Uncomment and adjust for your setup:
monitorrule=name:^HDMI-A-1$,width:1920,height:1080,refresh:144,x:1920,y:0,scale:1,vrr:1,rr:0

# Virtual monitors (for Sunshine/Moonlight streaming)
# monitorrule=name:HEADLESS-.*,width:1920,height:1080,refresh:60,x:3840,y:0,scale:1,vrr:0,rr:0
