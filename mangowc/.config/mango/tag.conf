# ============================================================
# Mango WM - Tag Rules
# ============================================================
# Per-tag layout configuration and persistence.
# Format: tagrule=id:N,Parameter:Value,...

# ---- Tag Layouts ----
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:grid
tagrule=id:5,layout_name:monocle
tagrule=id:6,layout_name:deck
tagrule=id:7,layout_name:center_tile
tagrule=id:8,layout_name:vertical_tile
tagrule=id:9,layout_name:scroller

# ---- Persistent Tags (always visible in bar) ----
tagrule=id:1,no_hide:1,layout_name:tile
tagrule=id:2,no_hide:1,layout_name:tile
tagrule=id:3,no_hide:1,layout_name:scroller
tagrule=id:4,no_hide:1,layout_name:grid
tagrule=id:5,no_hide:1,layout_name:monocle

# ---- Master Layout Adjustments ----
tagrule=id:1,nmaster:1,mfact:0.55
tagrule=id:2,nmaster:2,mfact:0.60
tagrule=id:7,nmaster:1,mfact:0.50
