# ============================================================
# Mango WM - Window Rules
# ============================================================
# Format: windowrule=Parameter:Values,appid/title:Pattern
# Supports regex for appid and title matching.

# ---- Floating Windows ----
windowrule=isfloating:1,appid:pavucontrol
windowrule=isfloating:1,appid:blueman-manager
windowrule=isfloating:1,appid:nm-connection-editor
windowrule=isfloating:1,appid:org.gnome.Calculator
windowrule=isfloating:1,appid:org.gnome.Loupe
windowrule=isfloating:1,appid:imv
windowrule=isfloating:1,appid:mpv
windowrule=isfloating:1,title:Picture-in-Picture
windowrule=isfloating:1,title:pinentry

# ---- Pinentry (center) ----
windowrule=isfloating:1,width:400,height:300,appid:pinentry-gtk-2

# ---- Firefox Picture-in-Picture ----
windowrule=isfloating:1,width:480,height:360,appid:firefox,title:Picture-in-Picture

# ---- Steam ----
windowrule=isfloating:1,appid:steam,title:^$
windowrule=isfloating:1,appid:steam,title:Steam Guard

# ---- Global Windows (sticky across tags) ----
windowrule=isglobal:1,appid:waybar

# ---- Opacity ----
windowrule=focused_opacity:1.0,appid:foot
windowrule=unfocused_opacity:0.85,appid:foot

# ---- No Blur ----
windowrule=noblur:1,appid:slurp
windowrule=noblur:1,appid:grim
windowrule=noblur:1,appid:wlogout
windowrule=noblur:1,appid:rofi

# ---- No Shadow ----
windowrule=isnoshadow:1,appid:waybar
windowrule=isnoshadow:1,appid:slurp

# ---- No Border ----
windowrule=isnoborder:1,appid:waybar
windowrule=isnoborder:1,appid:dms

# ---- No Radius ----
windowrule=isnoradius:1,appid:waybar

# ---- Tearing (Games) ----
# windowrule=force_tearing:1,title:vkcube
# windowrule=force_tearing:1,title:Counter-Strike 2

# ---- Terminal Swallowing ----
windowrule=isterm:1,appid:foot
windowrule=isterm:1,appid:alacritty
windowrule=isterm:1,appid:kitty
windowrule=isterm:1,appid:st

# ---- Layer Rules ----
layerrule=noblur:1,layer_name:selection
layerrule=noanim:0,noblur:1,layer_name:rofi
