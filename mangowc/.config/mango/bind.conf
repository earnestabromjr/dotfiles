# ============================================================
# Mango WM - Keybindings
# ============================================================
# Format: bind[flags]=MODIFIERS,KEY,COMMAND,PARAMETERS
# Flags: l=locked, s=keysym, r=release, p=pass
# Modifiers: SUPER/CTRL/ALT/SHIFT/NONE (combine with +)

# ---- Common (apply in all modes) ----
keymode=common
bind=SUPER,r,reload_config

# ---- Default Mode ----
keymode=default

# === Application Launchers ===
bind=ALT,Return,spawn,ghostty
bind=ALT,d,spawn,foot -e yazi
bind=ALT,b,spawn,brave-browser
bind=SUPER,Return,spawn,kitty
bind=CTRL+ALT,t,spawn,foot
bind=SUPER+SHIFT,Return,spawn,alacritty

# === DMS Integration ===
bind=SUPER,space,spawn,dms ipc call launcher toggle
bind=SUPER+SHIFT,space,spawn,dms ipc call spotlight toggle
bind=SUPER+SHIFT,v,spawn,dms ipc call clipboard toggle
bind=SUPER+SHIFT,n,spawn,dms ipc call notifications toggle
bind=SUPER+SHIFT,s,spawn,dms ipc call settings toggle
bind=SUPER+SHIFT,p,spawn,dms ipc call powermenu toggle
bind=SUPER+SHIFT,w,spawn,dms ipc call dankdash wallpaper
bind=SUPER+SHIFT,l,spawn,dms ipc call lock lock
bind=SUPER+SHIFT,m,spawn,dms ipc call mux toggle
bind=SUPER+SHIFT,o,spawn,dms ipc call notepad toggle

# === Window Management ===
bind=ALT,q,killclient
bind=SUPER,f,togglefullscreen
bind=ALT,f,togglefloating
bind=SUPER+SHIFT,f,togglefakefullscreen
bind=SUPER+SHIFT,x,toggle_all_floating
bind=SUPER,m,togglemaximizescreen
bind=ALT,c,centerwin
bind=SUPER,o,toggleoverview
bind=SUPER+SHIFT,t,toggle_render_border
bind=SUPER+CTRL,space,toggleoverlay
bind=ALT+SHIFT,space,toggleglobal

# === Tag Navigation ===
bind=ALT,1,view,1
bind=ALT,2,view,2
bind=ALT,3,view,3
bind=ALT,4,view,4
bind=ALT,5,view,5
bind=ALT,6,view,6
bind=ALT,7,view,7
bind=ALT,8,view,8
bind=ALT,9,view,9
bind=ALT,0,view,0

bind=CTRL,1,view,1
bind=CTRL,2,view,2
bind=CTRL,3,view,3
bind=CTRL,4,view,4
bind=CTRL,5,view,5
bind=CTRL,6,view,6
bind=CTRL,7,view,7
bind=CTRL,8,view,8
bind=CTRL,9,view,9

bind=SUPER,Tab,viewtoleft
bind=SUPER+SHIFT,Tab,viewtoright
bind=SUPER+CTRL,l,viewtoleft
bind=SUPER+CTRL,h,viewtoright

# === Move Window to Tag ===
bind=ALT+SHIFT,1,tag,1
bind=ALT+SHIFT,2,tag,2
bind=ALT+SHIFT,3,tag,3
bind=ALT+SHIFT,4,tag,4
bind=ALT+SHIFT,5,tag,5
bind=ALT+SHIFT,6,tag,6
bind=ALT+SHIFT,7,tag,7
bind=ALT+SHIFT,8,tag,8
bind=ALT+SHIFT,9,tag,9

bind=CTRL+SHIFT,1,tag,1
bind=CTRL+SHIFT,2,tag,2
bind=CTRL+SHIFT,3,tag,3
bind=CTRL+SHIFT,4,tag,4
bind=CTRL+SHIFT,5,tag,5
bind=CTRL+SHIFT,6,tag,6
bind=CTRL+SHIFT,7,tag,7
bind=CTRL+SHIFT,8,tag,8
bind=CTRL+SHIFT,9,tag,9

# === Focus & Movement ===
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down

bind=ALT+SHIFT,Left,exchange_client,left
bind=ALT+SHIFT,Right,exchange_client,right
bind=ALT+SHIFT,Up,exchange_client,up
bind=ALT+SHIFT,Down,exchange_client,down

bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

bind=ALT,o,focusdir,left
bind=ALT,i,focusdir,up
bind=ALT,e,focusdir,down
bind=ALT,u,focusdir,right

# === Focus Stack ===
bind=SUPER,j,focusstack,prev
bind=SUPER,k,focusstack,next

# === Layouts ===
bind=ALT,space,switch_layout
bind=ALT,t,setlayout,tile
bind=ALT,s,setlayout,scroller
bind=ALT,m,setlayout,monocle
bind=ALT,g,setlayout,grid
bind=ALT,d,setlayout,deck
bind=ALT+SHIFT,t,setlayout,center_tile
bind=ALT+SHIFT,s,setlayout,vertical_scroller
bind=ALT+SHIFT,g,setlayout,vertical_grid

# === Master ===
bind=SUPER+SHIFT,equal,incnmaster,+1
bind=SUPER+SHIFT,minus,incnmaster,-1
bind=SUPER+CTRL,equal,setmfact,+0.05
bind=SUPER+CTRL,minus,setmfact,-0.05
bind=SUPER+CTRL,BackSpace,default_mfact,0.55

# === Gaps ===
bind=SUPER+CTRL+SHIFT,equal,incgaps,+2
bind=SUPER+CTRL+SHIFT,minus,incgaps,-2
bind=SUPER+CTRL+SHIFT,BackSpace,togglegaps

# === Scratchpad ===
bind=SUPER,i,minimized
bind=ALT,z,toggle_scratchpad
bind=SUPER+SHIFT,i,restore_minimized

# === Multi-Monitor ===
bind=SUPER,period,focusmon,right
bind=SUPER,comma,focusmon,left
bind=SUPER+SHIFT,period,tagmon,right
bind=SUPER+SHIFT,comma,tagmon,left

# === Floating Window Movement ===
bind=SUPER+CTRL,Left,smartmovewin,left
bind=SUPER+CTRL,Right,smartmovewin,right
bind=SUPER+CTRL,Up,smartmovewin,up
bind=SUPER+CTRL,Down,smartmovewin,down

bind=SUPER+ALT,Left,smartresizewin,left
bind=SUPER+ALT,Right,smartresizewin,right
bind=SUPER+ALT,Up,smartresizewin,up
bind=SUPER+ALT,Down,smartresizewin,down

# === Resize Mode ===
bind=SUPER+SHIFT,r,setkeymode,resize

# === Media Controls ===
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=SHIFT,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause

bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl s +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 5%-
bind=SHIFT,XF86MonBrightnessUp,spawn,brightnessctl s 100%
bind=SHIFT,XF86MonBrightnessDown,spawn,brightnessctl s 1%

# === Screenshot ===
bind=NONE,Print,spawn,grim -g "$(slurp)" - | wl-copy
bind=SHIFT,Print,spawn,grim - | wl-copy
bind=CTRL,Print,spawn,grim -g "$(slurp)" ~/Pictures/Screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png

# === System ===
bind=SUPER+CTRL,q,quit
bind=SUPER+SHIFT+CTRL,q,quit
bind=ALT+SHIFT+CTRL,q,quit

# ---- Resize Mode ----
keymode=resize
bind=NONE,Left,resizewin,-10,0
bind=NONE,Right,resizewin,+10,0
bind=NONE,Up,resizewin,0,-10
bind=NONE,Down,resizewin,0,+10
bind=SHIFT,Left,resizewin,-50,0
bind=SHIFT,Right,resizewin,+50,0
bind=SHIFT,Up,resizewin,0,-50
bind=SHIFT,Down,resizewin,0,+50
bind=NONE,Escape,setkeymode,default
bind=SUPER+SHIFT,r,setkeymode,default
