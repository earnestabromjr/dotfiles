<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

<style type="text/css">
body {
    padding: 0;
}

.alert-info {
    color: #0c5460;
    background-color: #d1ecf1;
    border-color: #bee5eb;
    border: 1px solid transparent;
    font-size: 13px;
}

.li_wrapper {
    width: 300px;
    padding: 10px 10px 5px 10px;
    font-family: "Montserrat",-apple-system,system-ui,BlinkMacSystemFont,Segoe UI,Roboto,Oxygen-Sans,Ubuntu,Cantarell,Helvetica Neue,sans-serif;
    font-size: 14px;
    box-sizing: border-box;
}

.li_wrapper h1 {
    font-size: 1.25em;
    margin: 0 0 .5em 0;
    padding: 0;
}

.li_wrapper select,
.li_wrapper input,
.li_wrapper button {
    font-family: "Montserrat",-apple-system,system-ui,BlinkMacSystemFont,Segoe UI,Roboto,Oxygen-Sans,Ubuntu,Cantarell,Helvetica Neue,sans-serif;
    font-size: 14px;
}

.li_wrapper .li_block {
    margin-bottom: .5em;
}

.li_wrapper .li_block:nth-last-of-type(1) {
    margin-bottom: 0;
}

.li_wrapper .li_block .li_row {
    font-size: 0;
}

.li_wrapper .li_block .li_row .li_col {
    display: inline-block;
    vertical-align: top;
}

.li_wrapper .li_block .li_row .li_col_1 {
    width: 25%;
    margin-right: 2%;
}

.li_wrapper .li_block .li_row .li_col_3 {
    width: 73%;
}

.li_wrapper input[type="number"] {
    width: 100%;
    box-sizing: border-box;
}

.li_wrapper select {
    width: 100%;
}

.li_wrapper button {
    width: 100%;
}

.li_wrapper textarea {
    width: 100%;
    box-sizing: border-box;
    font-size: 11px;
    margin-bottom: 0;
}

.form-control {
    display: block;
    width: 100%;
    padding: .375rem .75rem;
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.5;
    color: #212529;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-color: #fff;
    background-clip: padding-box;
    border: 1px solid #dee2e6;
    border-radius: 0.375rem;
    transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
}

select.form-control {
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right .75rem center;
    background-size: 16px 12px;
}

.form-check-input {
    --bs-form-check-bg: #fff;
    flex-shrink: 0;
    width: 1em;
    height: 1em;
    margin-top: .25em;
    vertical-align: top;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-color: #fff;
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3e%3cpath fill='none' stroke='%23fff' stroke-linecap='round' stroke-linejoin='round' stroke-width='3' d='m6 10 3 3 6-6'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    border: 1px solid #dee2e6;
    -webkit-print-color-adjust: exact;
    color-adjust: exact;
    print-color-adjust: exact;
}

.form-check-input:checked {
    background-color: #F46C19;
    border-color: #F46C19;
}

.form-check-input[type=checkbox] {
    border-radius: .25em;
}

.form-check .form-check-input {
    float: left;
    margin-left: -1.5em;
}

.btn {
    --bs-btn-padding-x: 0.75rem;
    --bs-btn-padding-y: 0.375rem;
    --bs-btn-font-family: ;
    --bs-btn-font-size: 1rem;
    --bs-btn-font-weight: 400;
    --bs-btn-line-height: 1.5;
    --bs-btn-color: var(--bs-body-color);
    --bs-btn-bg: transparent;
    --bs-btn-border-width: var(--bs-border-width);
    --bs-btn-border-color: transparent;
    --bs-btn-border-radius: var(--bs-border-radius);
    --bs-btn-hover-border-color: transparent;
    --bs-btn-box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15), 0 1px 1px rgba(0, 0, 0, 0.075);
    --bs-btn-disabled-opacity: 0.65;
    --bs-btn-focus-box-shadow: 0 0 0 0.25rem rgba(var(--bs-btn-focus-shadow-rgb), .5);
    display: inline-block;
    padding: var(--bs-btn-padding-y) var(--bs-btn-padding-x);
    font-family: var(--bs-btn-font-family);
    font-size: var(--bs-btn-font-size);
    font-weight: var(--bs-btn-font-weight);
    line-height: var(--bs-btn-line-height);
    color: var(--bs-btn-color);
    text-align: center;
    text-decoration: none;
    vertical-align: middle;
    cursor: pointer;
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
    border: 1px solid #F46C19;
    font-weight: bold;
    border-radius: .375rem;
    background-color: #F46C19;
    transition: color .15s ease-in-out, background-color .15s ease-in-out, border-color .15s ease-in-out, box-shadow .15s ease-in-out;
}

.btn-primary {
    --bs-btn-color: #fff;
    --bs-btn-bg: #0d6efd;
    --bs-btn-border-color: #0d6efd;
    --bs-btn-hover-color: #fff;
    --bs-btn-hover-bg: #0b5ed7;
    --bs-btn-hover-border-color: #0a58ca;
    --bs-btn-focus-shadow-rgb: 49, 132, 253;
    --bs-btn-active-color: #fff;
    --bs-btn-active-bg: #0a58ca;
    --bs-btn-active-border-color: #0a53be;
    --bs-btn-active-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.125);
    --bs-btn-disabled-color: #fff;
    --bs-btn-disabled-bg: #0d6efd;
    --bs-btn-disabled-border-color: #0d6efd;
}

.btn-outline-primary {
    background-color: #fff;
    --bs-btn-color: #F46C19;
    --bs-btn-border-color: #F46C19;
    --bs-btn-hover-color: #fff;
    --bs-btn-hover-bg: #0d6efd;
    --bs-btn-hover-border-color: #0d6efd;
    --bs-btn-focus-shadow-rgb: 13, 110, 253;
    --bs-btn-active-color: #fff;
    --bs-btn-active-bg: #0d6efd;
    --bs-btn-active-border-color: #0d6efd;
    --bs-btn-active-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.125);
    --bs-btn-disabled-color: #0d6efd;
    --bs-btn-disabled-bg: transparent;
    --bs-btn-disabled-border-color: #0d6efd;
    --bs-gradient: none;
}

#copy_text {
    display: none;
}

#presets_list,
#last_used_list {
  margin-top: 1em;
}

.rate_us_block {
    text-align: center;
    font-size: .9em;
}

.rate_us_block span#a_show_rate_block,
span#a_show_manage_presets,
span#a_show_last_used {
    text-decoration: none;
    color: #1A54E9;
    cursor: pointer;
}

.rate_us_block span#a_show_rate_block span,
span#a_show_manage_presets span,
span#a_show_last_used span {
    border-bottom: 1px solid #1A54E9;
}

.rate_us_block span#a_show_rate_block:hover,
span#a_show_manage_presets:hover,
span#a_show_last_used:hover {
    color: #103083;
}

.rate_us_block span#a_show_rate_block:hover span,
span#a_show_manage_presets:hover span,
span#a_show_last_used:hover span {
    border-bottom-color: #103083;
}

/* Full stars */
.full-stars {
    text-align: center;
  }
  .full-stars .rating-group {
    display: inline-flex;
  }
  .full-stars input {
    position: absolute;
    left: -9999px;
  }
  .full-stars label {
    margin: 0;
    cursor: pointer;
  }
  .full-stars label a svg {
    margin: 2px;
    height: 30px;
    width: 30px;
    fill: #ff8400;
    transition: fill 0.3s;
  }
  .full-stars input:checked ~ label a svg {
    fill: #ffc711;
  }
  .full-stars .rating-group:hover label a svg {
    fill: #ff8400;
  }
  .full-stars .rating-group input:hover ~ label a svg {
    fill: #ffc711;
  }

  #full_stars_block {
    display: none;
  }

  #rate_text {
    display: none;
    font-size: .9em;
    text-align: center;
    margin: .75em 0 .5em 0;
  }

  #manage_presets_block h3 {
    font-size: 1.1em;
    margin: 0 0 1em 0;
    text-align: center;
  }

  .preset-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px;
    margin: 5px 0;
    background: #f8f9fa;
    border: 1px solid #dee2e6;
    border-radius: 5px;
    font-size: 13px;
  }

  .preset-item:hover {
    background: #e9ecef;
  }

  .preset-name {
    flex: 1;
    color: #495057;
    margin-right: 5px;
  }

  .preset-generate {
    background: #28a745;
    color: white;
    border: none;
    border-radius: 3px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 10px !important;
    width: 24px !important;
    margin-right: 5px;
    height: 24px !important;
  }

  .preset-generate:hover {
    background: #218838;
  }

  .preset-delete {
    background: #dc3545;
    color: white;
    border: none;
    border-radius: 3px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 12px !important;
    width: 24px !important;
    height: 24px !important;
  }

  .preset-delete:hover {
    background: #c82333;
  }

  .no-presets {
    text-align: center;
    color: #6c757d;
    font-style: italic;
    padding: 20px;
  }
</style>
